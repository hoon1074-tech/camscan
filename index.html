<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CamScan">
<title>CamScan</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#0d0d0d;--surface:#1a1a1a;--surface2:#242424;--border:#333;
  --accent:#00e5a0;--accent2:#00b8ff;--text:#f0f0f0;--text-dim:#777;--warn:#ffb300;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:21px;font-weight:700;}
.logo .cam{color:var(--accent);}
.logo .sw{color:var(--accent2);}
.badge{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);background:var(--surface2);padding:4px 10px;border-radius:20px;}

/* Screens */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── CAMERA ── */
#cam-screen{position:relative;background:#000;}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#overlay-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.cam-tip{position:absolute;top:14px;left:50%;transform:translateX(-50%);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;font-family:'Space Mono',monospace;background:rgba(0,0,0,0.55);color:rgba(255,255,255,0.7);white-space:nowrap;border:1px solid rgba(255,255,255,0.15);}
.cam-controls{position:absolute;bottom:0;left:0;right:0;padding:16px 24px 28px;background:linear-gradient(transparent,rgba(0,0,0,0.93));display:flex;align-items:center;justify-content:space-around;}
.btn-gallery-cam{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-shutter{width:74px;height:74px;border-radius:50%;background:var(--accent);border:5px solid rgba(0,229,160,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(0,229,160,0.5);transition:transform 0.1s;}
.btn-shutter:active{transform:scale(0.9);}
.btn-shutter-inner{width:30px;height:30px;border-radius:50%;background:#fff;}
.thumb-wrap{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:10px;text-align:center;line-height:1.4;}
#thumb-img{width:100%;height:100%;object-fit:cover;display:none;}

/* ── CROP ── */
#crop-screen{background:#0a0a0a;}
.crop-top{padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.screen-label{font-size:12px;color:var(--text-dim);font-family:'Space Mono',monospace;letter-spacing:1px;flex:1;}
.crop-hint{font-size:11px;color:var(--text-dim);text-align:center;padding:5px 16px;flex-shrink:0;background:rgba(0,229,160,0.05);border-bottom:1px solid var(--border);}
.crop-hint span{color:var(--accent);font-weight:700;}

/* 캔버스 영역이 화면 전체를 최대한 차지 */
.crop-wrap{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:#111;
}
#crop-canvas{display:block;max-width:100%;max-height:100%;touch-action:none;}

/* 버튼을 캔버스 위에 오버레이로 배치 — 화면 하단에 떠있는 형태 */
.crop-actions{
  position:absolute;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:10;
  pointer-events:none; /* 캔버스 터치 방해 안 함 */
}
.crop-actions button{pointer-events:all;}
.btn-reset{
  padding:11px 18px;border-radius:40px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(30,30,30,0.85);
  backdrop-filter:blur(8px);
  color:var(--text-dim);font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  white-space:nowrap;
}
.btn-apply{
  padding:11px 24px;border-radius:40px;border:none;
  background:var(--accent);color:#000;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 4px 20px rgba(0,229,160,0.45);
  white-space:nowrap;
}

/* ── REVIEW ── */
#review-screen{background:var(--bg);}
.review-top{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.screen-label2{font-size:12px;color:var(--text-dim);font-family:'Space Mono',monospace;letter-spacing:1px;}
.preview-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:14px;background:#111;}
#result-canvas{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 6px 32px rgba(0,0,0,0.7);}
.filter-bar{padding:12px 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
.filter-label{font-size:10px;color:var(--text-dim);letter-spacing:2px;font-family:'Space Mono',monospace;margin-bottom:8px;}
.filter-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:7px 15px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.18s;}
.filter-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,0.1);}
.save-bar{padding:14px 16px;display:flex;gap:10px;flex-shrink:0;}
.btn-save{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform 0.1s;border:none;}
.btn-save:active{transform:scale(0.97);}
.btn-jpg{background:var(--surface2);border:1px solid var(--border)!important;color:var(--text);}
.btn-pdf{background:var(--accent);color:#000;}
.btn-more{width:calc(100% - 32px);margin:0 16px 14px;padding:11px;border-radius:12px;background:transparent;border:1px dashed var(--border);color:var(--text-dim);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* ── GALLERY ── */
#gallery-screen{background:var(--bg);}
.gallery-top{padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.gallery-title{font-size:15px;font-weight:700;}
.gallery-grid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start;}
.g-item{aspect-ratio:3/4;border-radius:10px;overflow:hidden;position:relative;background:var(--surface);border:1px solid var(--border);cursor:pointer;}
.g-item img{width:100%;height:100%;object-fit:cover;}
.g-label{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,0.75));font-size:10px;color:rgba(255,255,255,0.65);font-family:'Space Mono',monospace;}
.g-empty{grid-column:1/-1;text-align:center;color:var(--text-dim);font-size:14px;padding:60px 0;}

/* Shared */
.btn-back{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--accent);color:#000;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:all 0.28s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#file-input{display:none;}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="cam">Cam</span><span class="sw">Scan</span></div>
  <div class="badge" id="badge">0장</div>
</div>

<!-- CAMERA -->
<div class="screen active" id="cam-screen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>
  <div class="cam-tip">📄 촬영 후 꼭짓점을 조정할 수 있어요</div>
  <div class="cam-controls">
    <button class="btn-gallery-cam" id="btn-gallery">🖼️</button>
    <button class="btn-shutter" id="btn-shutter"><div class="btn-shutter-inner"></div></button>
    <div class="thumb-wrap" id="btn-thumb">
      <img id="thumb-img" alt="">
      <span id="thumb-empty">스캔<br>없음</span>
    </div>
  </div>
</div>

<!-- CROP / 꼭짓점 조정 -->
<div class="screen" id="crop-screen">
  <div class="crop-top">
    <button class="btn-back" id="btn-back-crop">← 다시 찍기</button>
    <span class="screen-label">꼭짓점 조정</span>
  </div>
  <div class="crop-hint">
    🟢 <span>4개의 초록 꼭짓점</span>을 드래그해서 문서 모서리에 정확히 맞춰주세요
  </div>
  <div class="crop-wrap">
    <canvas id="crop-canvas"></canvas>
    <div class="crop-actions">
      <button class="btn-reset" id="btn-reset">↺ 초기화</button>
      <button class="btn-apply" id="btn-apply">✂️ 문서 추출 &amp; 보정</button>
    </div>
  </div>
</div>

<!-- REVIEW -->
<div class="screen" id="review-screen">
  <div class="review-top">
    <button class="btn-back" id="btn-back-review">← 재조정</button>
    <span class="screen-label2">PREVIEW</span>
  </div>
  <div class="preview-wrap">
    <canvas id="result-canvas"></canvas>
  </div>
  <div class="filter-bar">
    <div class="filter-label">FILTER</div>
    <div class="filter-row">
      <button class="filter-btn on" data-f="original">원본</button>
      <button class="filter-btn" data-f="scan">스캔</button>
      <button class="filter-btn" data-f="vivid">선명</button>
      <button class="filter-btn" data-f="bright">밝게</button>
      <button class="filter-btn" data-f="warm">따뜻</button>
    </div>
  </div>
  <div class="save-bar">
    <button class="btn-save btn-jpg" id="btn-jpg">📷 JPG 저장</button>
    <button class="btn-save btn-pdf" id="btn-pdf">📄 PDF 저장</button>
  </div>
  <button class="btn-more" id="btn-more">+ 페이지 추가 촬영</button>
</div>

<!-- GALLERY -->
<div class="screen" id="gallery-screen">
  <div class="gallery-top">
    <button class="btn-back" id="btn-back-gallery">← 뒤로</button>
    <span class="gallery-title">저장된 스캔</span>
  </div>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*">

<script>
const { jsPDF } = window.jspdf;
let stream = null;
let rawDataUrl = null;
let currentFilter = 'original';
let scans = [];
try { scans = JSON.parse(localStorage.getItem('cs4') || '[]'); } catch(e) {}

// ━━ 화면 전환 ━━
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'cam-screen') startCam();
  else stopCam();
  if (id === 'gallery-screen') renderGallery();
}

// ━━ 카메라 ━━
async function startCam() {
  if (stream) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) { toast('카메라 권한이 필요합니다'); }
}
function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('video').srcObject = null;
}

// ━━ 촬영 ━━
document.getElementById('btn-shutter').addEventListener('click', () => {
  const v = document.getElementById('video');
  if (!v.videoWidth) { toast('카메라가 준비되지 않았습니다'); return; }
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  rawDataUrl = c.toDataURL('image/jpeg', 0.96);
  openCrop(rawDataUrl, v.videoWidth, v.videoHeight);
});

document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    rawDataUrl = ev.target.result;
    const img = new Image();
    img.onload = () => openCrop(rawDataUrl, img.width, img.height);
    img.src = rawDataUrl;
  };
  r.readAsDataURL(f); e.target.value = '';
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CROP 화면 - 핵심 기능
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const cs = {
  img: null, imgW: 0, imgH: 0,
  scale: 1, cw: 0, ch: 0,
  // 4 꼭짓점: TL, TR, BR, BL (이미지 좌표)
  corners: [],
  dragging: -1,
  // 드래그 오프셋
  dragOffX: 0, dragOffY: 0
};

// 기본 꼭짓점: 이미지의 90% 영역 (여백 5%)
function defaultCorners(w, h) {
  const mx = w * 0.05, my = h * 0.05;
  return [
    {x: mx,   y: my},    // TL
    {x: w-mx, y: my},    // TR
    {x: w-mx, y: h-my},  // BR
    {x: mx,   y: h-my}   // BL
  ];
}

function openCrop(dataUrl, imgW, imgH) {
  const img = new Image();
  img.onload = () => {
    cs.img = img; cs.imgW = imgW; cs.imgH = imgH;

    // 캔버스 크기 계산
    requestAnimationFrame(() => {
      const wrap = document.querySelector('.crop-wrap');
      const maxW = wrap.clientWidth || window.innerWidth;
      const maxH = wrap.clientHeight || (window.innerHeight - 220);
      cs.scale = Math.min(maxW / imgW, maxH / imgH, 1);
      cs.cw = Math.round(imgW * cs.scale);
      cs.ch = Math.round(imgH * cs.scale);
      const cc = document.getElementById('crop-canvas');
      cc.width = cs.cw; cc.height = cs.ch;
      cs.corners = defaultCorners(imgW, imgH);
      drawCrop();
      show('crop-screen');
    });
  };
  img.src = dataUrl;
}

// ── 그리기 ──
function drawCrop() {
  const cc = document.getElementById('crop-canvas');
  const ctx = cc.getContext('2d');
  const s = cs.scale;
  ctx.clearRect(0, 0, cc.width, cc.height);

  // 원본 이미지
  ctx.drawImage(cs.img, 0, 0, cc.width, cc.height);

  // 선택 영역 바깥 어둡게
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.58)';
  ctx.fillRect(0, 0, cc.width, cc.height);
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  cs.corners.forEach((c, i) => i === 0 ? ctx.moveTo(c.x*s, c.y*s) : ctx.lineTo(c.x*s, c.y*s));
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 문서 영역 테두리
  ctx.save();
  ctx.beginPath();
  cs.corners.forEach((c, i) => i === 0 ? ctx.moveTo(c.x*s, c.y*s) : ctx.lineTo(c.x*s, c.y*s));
  ctx.closePath();
  ctx.strokeStyle = '#00e5a0';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(0,229,160,0.6)';
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.restore();

  // 엣지 중간 핸들 (선 가운데 작은 점 - 직관성 향상)
  for (let i = 0; i < 4; i++) {
    const a = cs.corners[i], b = cs.corners[(i+1)%4];
    const mx = (a.x+b.x)/2*s, my = (a.y+b.y)/2*s;
    ctx.save();
    ctx.beginPath(); ctx.arc(mx, my, 5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,229,160,0.5)'; ctx.fill();
    ctx.restore();
  }

  // 꼭짓점 핸들 - 크고 잡기 쉽게
  const labels = ['TL','TR','BR','BL'];
  cs.corners.forEach((c, i) => {
    const cx = c.x*s, cy = c.y*s;
    // 큰 터치 영역
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, 26, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,229,160,0.18)'; ctx.fill();
    // 외곽 링
    ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2);
    ctx.strokeStyle = '#00e5a0'; ctx.lineWidth = 2.5;
    ctx.shadowColor = 'rgba(0,229,160,0.7)'; ctx.shadowBlur = 8;
    ctx.stroke(); ctx.shadowBlur = 0;
    // 내부 채우기
    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2);
    ctx.fillStyle = '#00e5a0'; ctx.fill();
    // 중앙 흰 점
    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.restore();

    // L자형 모서리 표시 (CamScanner 스타일)
    const len = 22, lw = 4;
    ctx.save();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = lw; ctx.lineCap = 'round';
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 3;
    const dx = i===0||i===3 ? 1 : -1;
    const dy = i===0||i===1 ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(cx + dx*len, cy); ctx.lineTo(cx, cy); ctx.lineTo(cx, cy + dy*len);
    ctx.stroke();
    ctx.restore();
  });
}

// ── 터치/마우스 이벤트 ──
function getCanvasPos(e) {
  const cc = document.getElementById('crop-canvas');
  const rect = cc.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return {
    x: (t.clientX - rect.left) / cs.scale,
    y: (t.clientY - rect.top)  / cs.scale
  };
}

function findNearestCorner(pos) {
  let best = -1, bd = Infinity;
  // 터치 영역: 이미지 좌표 기준 60px
  cs.corners.forEach((c, i) => {
    const d = Math.hypot(c.x - pos.x, c.y - pos.y);
    if (d < bd) { bd = d; best = i; }
  });
  return bd < 80 ? best : -1;
}

const cropCanvas = document.getElementById('crop-canvas');

cropCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const pos = getCanvasPos(e);
  cs.dragging = findNearestCorner(pos);
  if (cs.dragging >= 0) {
    cs.dragOffX = cs.corners[cs.dragging].x - pos.x;
    cs.dragOffY = cs.corners[cs.dragging].y - pos.y;
  }
}, {passive: false});

cropCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (cs.dragging < 0) return;
  const pos = getCanvasPos(e);
  const nx = Math.max(0, Math.min(cs.imgW, pos.x + cs.dragOffX));
  const ny = Math.max(0, Math.min(cs.imgH, pos.y + cs.dragOffY));
  cs.corners[cs.dragging] = {x: nx, y: ny};
  drawCrop();
}, {passive: false});

cropCanvas.addEventListener('touchend', () => { cs.dragging = -1; });

cropCanvas.addEventListener('mousedown', e => {
  const pos = getCanvasPos(e);
  cs.dragging = findNearestCorner(pos);
  if (cs.dragging >= 0) {
    cs.dragOffX = cs.corners[cs.dragging].x - pos.x;
    cs.dragOffY = cs.corners[cs.dragging].y - pos.y;
  }
});
cropCanvas.addEventListener('mousemove', e => {
  if (cs.dragging < 0) return;
  const pos = getCanvasPos(e);
  const nx = Math.max(0, Math.min(cs.imgW, pos.x + cs.dragOffX));
  const ny = Math.max(0, Math.min(cs.imgH, pos.y + cs.dragOffY));
  cs.corners[cs.dragging] = {x: nx, y: ny};
  drawCrop();
});
cropCanvas.addEventListener('mouseup', () => { cs.dragging = -1; });

// 초기화 버튼
document.getElementById('btn-reset').addEventListener('click', () => {
  cs.corners = defaultCorners(cs.imgW, cs.imgH);
  drawCrop();
  toast('꼭짓점이 초기화됐어요');
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  원근 보정 적용 (Perspective Warp)
//  역방향 투영으로 깔끔한 직사각형 출력
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('btn-apply').addEventListener('click', applyWarp);

function applyWarp() {
  const [tl, tr, br, bl] = cs.corners;

  // 출력 크기: 각 변의 최대 길이로
  const wTop    = Math.hypot(tr.x-tl.x, tr.y-tl.y);
  const wBottom = Math.hypot(br.x-bl.x, br.y-bl.y);
  const hLeft   = Math.hypot(bl.x-tl.x, bl.y-tl.y);
  const hRight  = Math.hypot(br.x-tr.x, br.y-tr.y);
  const outW = Math.round(Math.max(wTop, wBottom));
  const outH = Math.round(Math.max(hLeft, hRight));

  if (outW < 50 || outH < 50) { toast('영역이 너무 작습니다'); return; }

  // 소스 이미지 픽셀 데이터
  const srcC = document.createElement('canvas');
  srcC.width = cs.imgW; srcC.height = cs.imgH;
  srcC.getContext('2d').drawImage(cs.img, 0, 0);
  const srcData = srcC.getContext('2d').getImageData(0, 0, cs.imgW, cs.imgH).data;

  // 출력 캔버스
  const dstC = document.createElement('canvas');
  dstC.width = outW; dstC.height = outH;
  const dstCtx = dstC.getContext('2d');
  const dstImgData = dstCtx.createImageData(outW, outH);
  const dst = dstImgData.data;

  // 역방향 투영 행렬 (출력→입력)
  // 출력의 4 꼭짓점 → 입력의 4 꼭짓점으로 매핑
  const srcPts = [{x:0,y:0},{x:outW,y:0},{x:outW,y:outH},{x:0,y:outH}];
  const dstPts = [tl, tr, br, bl];
  const H = getPerspMatrix(srcPts, dstPts);

  for (let y = 0; y < outH; y++) {
    for (let x = 0; x < outW; x++) {
      // 역투영: 출력 픽셀 → 입력 픽셀
      const [sx, sy] = applyH(H, x, y);
      const di = (y * outW + x) * 4;

      // 바이리니어 보간
      const x0 = Math.floor(sx), y0 = Math.floor(sy);
      const x1 = x0 + 1, y1 = y0 + 1;
      const fx = sx - x0, fy = sy - y0;

      if (x0 >= 0 && x1 < cs.imgW && y0 >= 0 && y1 < cs.imgH) {
        for (let c = 0; c < 3; c++) {
          const i00 = (y0*cs.imgW+x0)*4+c;
          const i10 = (y0*cs.imgW+x1)*4+c;
          const i01 = (y1*cs.imgW+x0)*4+c;
          const i11 = (y1*cs.imgW+x1)*4+c;
          dst[di+c] = Math.round(
            srcData[i00]*(1-fx)*(1-fy) +
            srcData[i10]*fx*(1-fy) +
            srcData[i01]*(1-fx)*fy +
            srcData[i11]*fx*fy
          );
        }
        dst[di+3] = 255;
      } else if (x0 >= 0 && x0 < cs.imgW && y0 >= 0 && y0 < cs.imgH) {
        const si = (y0*cs.imgW+x0)*4;
        dst[di]=srcData[si]; dst[di+1]=srcData[si+1]; dst[di+2]=srcData[si+2]; dst[di+3]=255;
      }
    }
  }

  dstCtx.putImageData(dstImgData, 0, 0);
  rawDataUrl = dstC.toDataURL('image/jpeg', 0.96);
  currentFilter = 'original';
  showReview(rawDataUrl);
}

// ── 원근 변환 행렬 (DLT) ──
function getPerspMatrix(src, dst) {
  const A = [];
  for (let i = 0; i < 4; i++) {
    const {x:sx,y:sy} = src[i], {x:dx,y:dy} = dst[i];
    A.push([sx,sy,1, 0,0,0, -dx*sx,-dx*sy]);
    A.push([0,0,0, sx,sy,1, -dy*sx,-dy*sy]);
  }
  const b = dst.flatMap(p => [p.x, p.y]);
  const h = gaussElim(A, b);
  return [...h, 1];
}

function gaussElim(A, b) {
  const n = 8;
  const M = A.map((row, i) => [...row, b[i]]);
  for (let col = 0; col < n; col++) {
    let maxRow = col;
    for (let row = col+1; row < n; row++)
      if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
    [M[col], M[maxRow]] = [M[maxRow], M[col]];
    if (Math.abs(M[col][col]) < 1e-10) continue;
    for (let row = col+1; row < n; row++) {
      const f = M[row][col] / M[col][col];
      for (let k = col; k <= n; k++) M[row][k] -= f * M[col][k];
    }
  }
  const x = new Array(n).fill(0);
  for (let i = n-1; i >= 0; i--) {
    if (Math.abs(M[i][i]) < 1e-10) continue;
    x[i] = M[i][n] / M[i][i];
    for (let k = i-1; k >= 0; k--) M[k][n] -= M[k][i] * x[i];
  }
  return x;
}

function applyH(H, x, y) {
  const w = H[6]*x + H[7]*y + H[8];
  return [(H[0]*x+H[1]*y+H[2])/w, (H[3]*x+H[4]*y+H[5])/w];
}

// ━━ 리뷰 / 필터 ━━
function showReview(dataUrl) {
  show('review-screen');
  currentFilter = 'original';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('on', b.dataset.f === 'original'));
  renderFilter(dataUrl, 'original');
}

function renderFilter(dataUrl, filter) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById('result-canvas');
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    if (filter !== 'original') {
      const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
      applyFilterData(id.data, canvas.width, canvas.height, filter);
      ctx.putImageData(id, 0, 0);
    }
    currentFilter = filter;
  };
  img.src = dataUrl;
}

function applyFilterData(d, w, h, f) {
  const cl = v => Math.min(255, Math.max(0, v));
  switch(f) {
    case 'scan': {
      // 그레이스케일 + 언샤프마스크 + S커브
      const g = new Uint8Array(w * h);
      for (let i = 0; i < d.length; i += 4)
        g[i>>2] = (d[i]*77 + d[i+1]*150 + d[i+2]*29) >> 8;
      const bl = gaussBlurArr(g, w, h);
      for (let i = 0; i < g.length; i++) {
        let v = g[i] + 2.2*(g[i] - bl[i]);
        v = (v - 45)*1.75 + 45;
        v = cl(v);
        const x = v/255;
        v = Math.round((x < 0.5 ? 2*x*x : 1-2*(1-x)*(1-x)) * 255);
        const idx = i*4;
        d[idx] = d[idx+1] = d[idx+2] = v;
      }
      break;
    }
    case 'vivid':
      for (let i = 0; i < d.length; i += 4) {
        const avg = (d[i]+d[i+1]+d[i+2])/3;
        d[i]   = cl(avg+(d[i]  -avg)*1.7+12);
        d[i+1] = cl(avg+(d[i+1]-avg)*1.5+6);
        d[i+2] = cl(avg+(d[i+2]-avg)*1.4);
        d[i]   = cl((d[i]  -128)*1.3+128);
        d[i+1] = cl((d[i+1]-128)*1.3+128);
        d[i+2] = cl((d[i+2]-128)*1.3+128);
      }
      break;
    case 'bright':
      for (let i = 0; i < d.length; i += 4) {
        d[i]=cl(d[i]*1.2+25); d[i+1]=cl(d[i+1]*1.2+25); d[i+2]=cl(d[i+2]*1.2+25);
      }
      break;
    case 'warm':
      for (let i = 0; i < d.length; i += 4) {
        d[i]=cl(d[i]*1.1+20); d[i+1]=cl(d[i+1]*1.02); d[i+2]=cl(d[i+2]*0.87);
      }
      break;
  }
}

function gaussBlurArr(g, w, h) {
  const r=2, kl=r*2+1, sig=1.2;
  const k = new Float32Array(kl);
  let ks=0;
  for(let i=0;i<kl;i++){const x=i-r;k[i]=Math.exp(-(x*x)/(2*sig*sig));ks+=k[i];}
  for(let i=0;i<kl;i++)k[i]/=ks;
  const tmp=new Uint8Array(g.length), res=new Uint8Array(g.length);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){let s=0,ws=0;for(let ki=0;ki<kl;ki++){const nx=x+ki-r;if(nx>=0&&nx<w){s+=g[y*w+nx]*k[ki];ws+=k[ki];}}tmp[y*w+x]=s/ws;}
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){let s=0,ws=0;for(let ki=0;ki<kl;ki++){const ny=y+ki-r;if(ny>=0&&ny<h){s+=tmp[ny*w+x]*k[ki];ws+=k[ki];}}res[y*w+x]=s/ws;}
  return res;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    renderFilter(rawDataUrl, btn.dataset.f);
  });
});

// ━━ 저장 ━━
document.getElementById('btn-jpg').addEventListener('click', () => {
  const c = document.getElementById('result-canvas');
  const url = c.toDataURL('image/jpeg', 0.93);
  dl(url, `camscan_${Date.now()}.jpg`);
  addScan(url); toast('✓ JPG 저장 완료');
});
document.getElementById('btn-pdf').addEventListener('click', () => {
  const c = document.getElementById('result-canvas');
  const url = c.toDataURL('image/jpeg', 0.93);
  const pdf = new jsPDF({orientation: c.width>c.height?'l':'p', unit:'px', format:[c.width,c.height]});
  pdf.addImage(url,'JPEG',0,0,c.width,c.height);
  pdf.save(`camscan_${Date.now()}.pdf`);
  addScan(url); toast('✓ PDF 저장 완료');
});
function dl(url, name){const a=document.createElement('a');a.href=url;a.download=name;a.click();}

function addScan(url) {
  scans.unshift({url, date: new Date().toLocaleString('ko-KR')});
  if (scans.length > 30) scans = scans.slice(0,30);
  try { localStorage.setItem('cs4', JSON.stringify(scans)); } catch(e) {}
  updateBadge(); updateThumb();
}

// ━━ 내비게이션 ━━
document.getElementById('btn-back-crop').addEventListener('click', () => show('cam-screen'));
document.getElementById('btn-back-review').addEventListener('click', () => openCrop(rawDataUrl, cs.imgW, cs.imgH));
document.getElementById('btn-back-gallery').addEventListener('click', () => show('cam-screen'));
document.getElementById('btn-gallery').addEventListener('click', () => show('gallery-screen'));
document.getElementById('btn-more').addEventListener('click', () => show('cam-screen'));
document.getElementById('btn-thumb').addEventListener('click', () => { if(scans.length>0) show('gallery-screen'); });

// ━━ 갤러리 ━━
function renderGallery() {
  const g = document.getElementById('gallery-grid');
  if (!scans.length) { g.innerHTML='<div class="g-empty">저장된 스캔이 없습니다</div>'; return; }
  g.innerHTML = scans.map((s,i) => `
    <div class="g-item" onclick="viewScan(${i})">
      <img src="${s.url}" alt="">
      <div class="g-label">${s.date}</div>
    </div>`).join('');
}
function viewScan(i) { rawDataUrl=scans[i].url; currentFilter='original'; showReview(rawDataUrl); }

// ━━ UI ━━
function updateBadge() { document.getElementById('badge').textContent = scans.length+'장'; }
function updateThumb() {
  const t=document.getElementById('thumb-img'), e=document.getElementById('thumb-empty');
  if(scans.length>0){t.src=scans[0].url;t.style.display='block';e.style.display='none';}
  else{t.style.display='none';e.style.display='';}
}
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

updateBadge(); updateThumb();
show('cam-screen');
</script>
