<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CamScan">
<title>CamScan — 문서 스캐너</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady()" onerror="onOpenCvError()"></script>
<style>
  :root {
    --bg:#0d0d0d; --surface:#1a1a1a; --surface2:#242424; --border:#2e2e2e;
    --accent:#00e5a0; --accent2:#00b8ff; --text:#f0f0f0; --text-dim:#666;
    --warn:#ffb300;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

  /* Loading */
  #cv-loading{position:fixed;inset:0;background:rgba(13,13,13,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:18px;}
  #cv-loading.hidden{display:none;}
  .cv-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .cv-msg{font-size:14px;color:var(--text-dim);text-align:center;line-height:1.7;}
  .cv-msg strong{color:var(--accent);display:block;margin-bottom:6px;font-size:17px;}

  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
  .logo{font-size:20px;font-weight:700;}
  .logo .cam{color:var(--accent);}
  .logo .sw{color:var(--accent2);}
  .scan-count{font-family:'Space Mono',monospace;font-size:12px;color:var(--text-dim);background:var(--surface2);padding:4px 10px;border-radius:20px;}

  /* Screens */
  .screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
  .screen.active{display:flex;}

  /* ── Camera ── */
  #camera-screen{position:relative;background:#000;}
  #video{width:100%;height:100%;object-fit:cover;display:block;}
  #outline-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  #doc-polygon{fill:rgba(0,229,160,0.13);stroke:var(--accent);stroke-width:3;stroke-linejoin:round;filter:drop-shadow(0 0 8px rgba(0,229,160,0.7));transition:all 0.12s;}
  #doc-polygon.lost{fill:rgba(255,179,0,0.08);stroke:var(--warn);filter:drop-shadow(0 0 4px rgba(255,179,0,0.4));}
  .corner-dot{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--accent);pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 0 6px rgba(0,229,160,0.8);transition:all 0.12s;}
  .guide-corner{position:absolute;width:26px;height:26px;border-color:rgba(255,255,255,0.25);border-style:solid;pointer-events:none;}
  .guide-corner.tl{top:14%;left:6%;border-width:2px 0 0 2px;}
  .guide-corner.tr{top:14%;right:6%;border-width:2px 2px 0 0;}
  .guide-corner.bl{bottom:28%;left:6%;border-width:0 0 2px 2px;}
  .guide-corner.br{bottom:28%;right:6%;border-width:0 2px 2px 0;}
  .detect-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:1px;transition:all 0.3s;white-space:nowrap;}
  .detect-badge.found{background:rgba(0,229,160,0.18);color:var(--accent);border:1px solid rgba(0,229,160,0.4);}
  .detect-badge.searching{background:rgba(255,179,0,0.13);color:var(--warn);border:1px solid rgba(255,179,0,0.3);}
  .camera-tip{position:absolute;bottom:112px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap;background:rgba(0,0,0,0.5);padding:5px 12px;border-radius:20px;}
  .camera-controls{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 26px;background:linear-gradient(transparent,rgba(0,0,0,0.92));display:flex;align-items:center;justify-content:space-around;}
  .btn-gallery{width:50px;height:50px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .btn-capture{width:72px;height:72px;border-radius:50%;background:var(--accent);border:4px solid rgba(0,229,160,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(0,229,160,0.45);transition:transform 0.1s,box-shadow 0.1s;}
  .btn-capture:active{transform:scale(0.92);box-shadow:0 0 10px rgba(0,229,160,0.2);}
  .btn-capture-inner{width:28px;height:28px;border-radius:50%;background:#fff;}
  .btn-preview-thumb{width:50px;height:50px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:11px;text-align:center;line-height:1.3;}
  #thumb-preview{width:100%;height:100%;object-fit:cover;display:none;}
  #detect-canvas{display:none;}

  /* ── Crop ── */
  #crop-screen{background:#111;}
  .crop-top{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .crop-title{font-size:13px;color:var(--text-dim);font-family:'Space Mono',monospace;}
  .crop-hint{font-size:11px;color:var(--text-dim);text-align:center;padding:8px 16px;flex-shrink:0;line-height:1.5;}
  .crop-canvas-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  #crop-canvas{touch-action:none;display:block;max-width:100%;max-height:100%;}
  .crop-actions{padding:12px 16px;display:flex;gap:10px;flex-shrink:0;}
  .btn-crop-auto{flex:1;padding:13px;border-radius:12px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
  .btn-crop-confirm{flex:1.6;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

  /* ── Review ── */
  #review-screen{background:var(--bg);}
  .review-top{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .review-title{font-size:13px;color:var(--text-dim);font-family:'Space Mono',monospace;}
  .canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:14px;background:#111;}
  #result-canvas{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 4px 30px rgba(0,0,0,0.6);}
  .filter-bar{padding:12px 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
  .filter-label{font-size:10px;color:var(--text-dim);letter-spacing:2px;font-family:'Space Mono',monospace;margin-bottom:8px;}
  .filter-list{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
  .filter-list::-webkit-scrollbar{display:none;}
  .filter-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;}
  .filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,0.1);}
  .action-bar{padding:14px 16px;display:flex;gap:10px;flex-shrink:0;}
  .btn-action{flex:1;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s,transform 0.1s;}
  .btn-action:active{transform:scale(0.97);opacity:0.85;}
  .btn-jpg{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
  .btn-pdf{background:var(--accent);color:#000;}
  .btn-add-more{width:calc(100% - 32px);margin:0 16px 14px;padding:11px;border-radius:12px;background:transparent;border:1px dashed var(--border);color:var(--text-dim);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:border-color 0.2s,color 0.2s;}
  .btn-add-more:hover{border-color:var(--accent);color:var(--accent);}

  /* ── Gallery ── */
  #gallery-screen{background:var(--bg);}
  .gallery-top{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .gallery-title{font-size:15px;font-weight:700;}
  .gallery-grid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start;}
  .gallery-item{aspect-ratio:3/4;border-radius:10px;overflow:hidden;position:relative;background:var(--surface);border:1px solid var(--border);cursor:pointer;}
  .gallery-item img{width:100%;height:100%;object-fit:cover;}
  .gallery-item-overlay{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,0.7));font-size:10px;color:rgba(255,255,255,0.7);font-family:'Space Mono',monospace;}
  .gallery-empty{grid-column:1/-1;text-align:center;color:var(--text-dim);font-size:14px;padding:60px 0;}

  /* Shared */
  .btn-back{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #file-input{display:none;}
</style>
</head>
<body>

<div id="cv-loading">
  <div class="cv-spinner"></div>
  <div class="cv-msg">
    <strong>CamScan 준비 중</strong>
    이미지 처리 엔진(OpenCV)을 불러오는 중…<br>
    <span style="font-size:11px;color:#444;margin-top:6px;display:block">처음 실행 시 수 초 소요될 수 있어요</span>
  </div>
</div>

<div class="header">
  <div class="logo"><span class="cam">Cam</span><span class="sw">Scan</span></div>
  <div class="scan-count" id="scan-count-badge">0장</div>
</div>

<!-- CAMERA -->
<div class="screen active" id="camera-screen">
  <video id="video" autoplay playsinline muted></video>
  <svg id="outline-svg" viewBox="0 0 1 1" preserveAspectRatio="none">
    <polygon id="doc-polygon" points=""/>
  </svg>
  <div class="guide-corner tl"></div>
  <div class="guide-corner tr"></div>
  <div class="guide-corner bl"></div>
  <div class="guide-corner br"></div>
  <div class="detect-badge searching" id="detect-badge">문서 탐색 중…</div>
  <div class="camera-tip">📄 문서를 카메라에 비춰주세요</div>
  <div class="camera-controls">
    <button class="btn-gallery" id="btn-open-gallery">🖼️</button>
    <button class="btn-capture" id="btn-capture"><div class="btn-capture-inner"></div></button>
    <div class="btn-preview-thumb" id="btn-preview-thumb">
      <img id="thumb-preview" alt="">
      <span id="thumb-empty-text">스캔<br>없음</span>
    </div>
  </div>
  <canvas id="detect-canvas"></canvas>
</div>

<!-- CROP -->
<div class="screen" id="crop-screen">
  <div class="crop-top">
    <button class="btn-back" id="btn-back-crop">← 다시 찍기</button>
    <span class="crop-title">영역 조정</span>
  </div>
  <div class="crop-hint">📌 네 꼭짓점을 드래그해서 문서 경계를 정확히 맞춰주세요</div>
  <div class="crop-canvas-wrap">
    <canvas id="crop-canvas"></canvas>
  </div>
  <div class="crop-actions">
    <button class="btn-crop-auto" id="btn-crop-auto">🔍 자동 감지</button>
    <button class="btn-crop-confirm" id="btn-crop-confirm">✂️ 원근 보정 적용</button>
  </div>
</div>

<!-- REVIEW -->
<div class="screen" id="review-screen">
  <div class="review-top">
    <button class="btn-back" id="btn-back-review">← 영역 재조정</button>
    <span class="review-title">PREVIEW</span>
  </div>
  <div class="canvas-wrap">
    <canvas id="result-canvas"></canvas>
  </div>
  <div class="filter-bar">
    <div class="filter-label">FILTER</div>
    <div class="filter-list">
      <button class="filter-btn active" data-filter="original">원본</button>
      <button class="filter-btn" data-filter="scan">스캔</button>
      <button class="filter-btn" data-filter="vivid">선명</button>
      <button class="filter-btn" data-filter="bright">밝게</button>
      <button class="filter-btn" data-filter="warm">따뜻</button>
    </div>
  </div>
  <div class="action-bar">
    <button class="btn-action btn-jpg" id="btn-save-jpg">📷 JPG 저장</button>
    <button class="btn-action btn-pdf" id="btn-save-pdf">📄 PDF 저장</button>
  </div>
  <button class="btn-add-more" id="btn-add-more">+ 페이지 추가 촬영</button>
</div>

<!-- GALLERY -->
<div class="screen" id="gallery-screen">
  <div class="gallery-top">
    <button class="btn-back" id="btn-back-gallery">← 뒤로</button>
    <span class="gallery-title">저장된 스캔</span>
  </div>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*">

<script>
const { jsPDF } = window.jspdf;
let cvReady = false;
let stream = null;
let detectTimer = null;
let lastCorners = null;
let currentRawDataUrl = null;
let currentFilter = 'original';
let savedScans = [];
try { savedScans = JSON.parse(localStorage.getItem('camscan_v2') || '[]'); } catch(e) {}

// ══ OpenCV ══
function onOpenCvReady() {
  cvReady = true;
  document.getElementById('cv-loading').classList.add('hidden');
  startCamera();
}
function onOpenCvError() {
  document.getElementById('cv-loading').innerHTML = `
    <div class="cv-msg">
      <strong style="color:var(--warn)">⚠️ 엔진 로드 실패</strong>
      네트워크를 확인 후 새로고침 해주세요.<br>
      <button onclick="location.reload()" style="margin-top:14px;padding:10px 24px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer">새로고침</button>
    </div>`;
}

// ══ Screens ══
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'camera-screen') { startCamera(); startDetection(); }
  else { stopDetection(); stopCamera(); }
  if (id === 'gallery-screen') renderGallery();
}

// ══ Camera ══
async function startCamera() {
  if (stream) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) { showToast('카메라 권한이 필요합니다'); }
}
function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('video').srcObject = null;
}

// ══ Real-time detection ══
function startDetection() {
  if (!cvReady) return;
  stopDetection();
  detectTimer = setInterval(runDetect, 350);
}
function stopDetection() {
  if (detectTimer) { clearInterval(detectTimer); detectTimer = null; }
}

function runDetect() {
  if (!cvReady) return;
  const video = document.getElementById('video');
  if (!video.videoWidth) return;
  const dc = document.getElementById('detect-canvas');
  const vw = video.videoWidth, vh = video.videoHeight;
  const sc = Math.min(320/vw, 240/vh);
  dc.width = Math.round(vw*sc); dc.height = Math.round(vh*sc);
  dc.getContext('2d').drawImage(video, 0, 0, dc.width, dc.height);
  const quad = findDocQuad(dc, sc);
  lastCorners = quad ? quad.map(p => ({x: p.x, y: p.y})) : null;
  drawOutline(quad, vw, vh);
}

function findDocQuad(canvas, scale) {
  let src, gray, blur, edges, cont, hier;
  let result = null;
  try {
    src=cv.imread(canvas); gray=new cv.Mat(); blur=new cv.Mat();
    edges=new cv.Mat(); cont=new cv.MatVector(); hier=new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);
    cv.Canny(blur, edges, 30, 90);
    const k = cv.Mat.ones(3,3,cv.CV_8U);
    cv.dilate(edges, edges, k); k.delete();
    cv.findContours(edges, cont, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
    let bestArea=0, bestQuad=null;
    const minArea = canvas.width * canvas.height * 0.05;
    for (let i=0; i<cont.size(); i++) {
      const c = cont.get(i);
      const area = cv.contourArea(c);
      if (area < minArea) { c.delete(); continue; }
      const peri = cv.arcLength(c, true);
      const approx = new cv.Mat();
      cv.approxPolyDP(c, approx, 0.02*peri, true);
      if (approx.rows === 4 && area > bestArea) {
        bestArea = area;
        bestQuad = [];
        for (let r=0; r<4; r++) bestQuad.push({x: approx.data32S[r*2]/scale, y: approx.data32S[r*2+1]/scale});
      }
      approx.delete(); c.delete();
    }
    if (bestQuad) result = sortQuad(bestQuad);
  } catch(e) {}
  finally { [src,gray,blur,edges,cont,hier].forEach(m=>{try{m&&m.delete();}catch(e){}}) }
  return result;
}

function sortQuad(pts) {
  const s = [...pts].sort((a,b)=>a.y-b.y);
  const top    = s.slice(0,2).sort((a,b)=>a.x-b.x);
  const bottom = s.slice(2).sort((a,b)=>a.x-b.x);
  return [top[0], top[1], bottom[1], bottom[0]];
}

function drawOutline(quad, vw, vh) {
  const poly  = document.getElementById('doc-polygon');
  const badge = document.getElementById('detect-badge');
  if (!quad) {
    poly.setAttribute('points','');
    badge.className='detect-badge searching';
    badge.textContent='문서 탐색 중…';
    return;
  }
  const pts = quad.map(p=>`${(p.x/vw).toFixed(4)},${(p.y/vh).toFixed(4)}`).join(' ');
  poly.setAttribute('points', pts);
  poly.className = '';
  badge.className = 'detect-badge found';
  badge.textContent = '✓ 문서 감지됨';
}

// ══ Capture ══
document.getElementById('btn-capture').addEventListener('click', () => {
  const video = document.getElementById('video');
  if (!video.videoWidth) { showToast('카메라가 준비되지 않았습니다'); return; }
  const c = document.createElement('canvas');
  c.width=video.videoWidth; c.height=video.videoHeight;
  c.getContext('2d').drawImage(video,0,0);
  currentRawDataUrl = c.toDataURL('image/jpeg', 0.95);
  openCropScreen(currentRawDataUrl, lastCorners, c.width, c.height);
});

document.getElementById('file-input').addEventListener('change', e => {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    currentRawDataUrl=ev.target.result;
    const img=new Image();
    img.onload=()=>openCropScreen(currentRawDataUrl,null,img.width,img.height);
    img.src=currentRawDataUrl;
  };
  r.readAsDataURL(file); e.target.value='';
});

// ══ Crop screen ══
const cs = { img:null, imgW:0, imgH:0, scale:1, cw:0, ch:0, corners:[], dragging:-1 };

function openCropScreen(dataUrl, detectedCorners, imgW, imgH) {
  const img = new Image();
  img.onload = () => {
    cs.img=img; cs.imgW=imgW; cs.imgH=imgH;
    const wrap = document.querySelector('.crop-canvas-wrap');
    const maxW = wrap.clientWidth||window.innerWidth;
    const maxH = wrap.clientHeight||(window.innerHeight-220);
    cs.scale = Math.min(maxW/imgW, maxH/imgH, 1);
    cs.cw = Math.round(imgW*cs.scale);
    cs.ch = Math.round(imgH*cs.scale);
    const cc=document.getElementById('crop-canvas');
    cc.width=cs.cw; cc.height=cs.ch;
    if (detectedCorners && detectedCorners.length===4) {
      cs.corners = sortQuad(detectedCorners);
    } else {
      const mx=imgW*0.1, my=imgH*0.1;
      cs.corners=[{x:mx,y:my},{x:imgW-mx,y:my},{x:imgW-mx,y:imgH-my},{x:mx,y:imgH-my}];
    }
    drawCrop();
    showScreen('crop-screen');
  };
  img.src=dataUrl;
}

function drawCrop() {
  const cc=document.getElementById('crop-canvas');
  const ctx=cc.getContext('2d');
  const s=cs.scale;
  ctx.clearRect(0,0,cc.width,cc.height);
  ctx.drawImage(cs.img,0,0,cc.width,cc.height);

  // Darken outside
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,cc.width,cc.height);
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();
  cs.corners.forEach((c,i)=>i===0?ctx.moveTo(c.x*s,c.y*s):ctx.lineTo(c.x*s,c.y*s));
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // Outline
  ctx.save();
  ctx.strokeStyle='#00e5a0'; ctx.lineWidth=2.5;
  ctx.beginPath();
  cs.corners.forEach((c,i)=>i===0?ctx.moveTo(c.x*s,c.y*s):ctx.lineTo(c.x*s,c.y*s));
  ctx.closePath(); ctx.stroke();
  ctx.restore();

  // Corner handles
  cs.corners.forEach(c=>{
    ctx.save();
    ctx.beginPath(); ctx.arc(c.x*s,c.y*s,20,0,Math.PI*2);
    ctx.fillStyle='rgba(0,229,160,0.2)'; ctx.fill();
    ctx.beginPath(); ctx.arc(c.x*s,c.y*s,9,0,Math.PI*2);
    ctx.fillStyle='#00e5a0'; ctx.fill();
    ctx.beginPath(); ctx.arc(c.x*s,c.y*s,9,0,Math.PI*2);
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
  });
}

function getPos(e) {
  const rect=document.getElementById('crop-canvas').getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:(t.clientX-rect.left)/cs.scale, y:(t.clientY-rect.top)/cs.scale};
}
function nearestCorner(pos) {
  let best=-1, bd=Infinity;
  cs.corners.forEach((c,i)=>{const d=Math.hypot(c.x-pos.x,c.y-pos.y);if(d<bd){bd=d;best=i;}});
  return bd<70?best:-1;
}

const cc2=document.getElementById('crop-canvas');
cc2.addEventListener('touchstart',e=>{e.preventDefault();cs.dragging=nearestCorner(getPos(e));},{passive:false});
cc2.addEventListener('touchmove',e=>{
  e.preventDefault(); if(cs.dragging<0) return;
  const p=getPos(e);
  p.x=Math.max(0,Math.min(cs.imgW,p.x)); p.y=Math.max(0,Math.min(cs.imgH,p.y));
  cs.corners[cs.dragging]=p; drawCrop();
},{passive:false});
cc2.addEventListener('touchend',()=>{cs.dragging=-1;});
cc2.addEventListener('mousedown',e=>{cs.dragging=nearestCorner(getPos(e));});
cc2.addEventListener('mousemove',e=>{
  if(cs.dragging<0) return;
  const p=getPos(e);
  p.x=Math.max(0,Math.min(cs.imgW,p.x)); p.y=Math.max(0,Math.min(cs.imgH,p.y));
  cs.corners[cs.dragging]=p; drawCrop();
});
cc2.addEventListener('mouseup',()=>{cs.dragging=-1;});

// Auto-detect on crop screen
document.getElementById('btn-crop-auto').addEventListener('click',()=>{
  if(!cvReady||!cs.img){showToast('처리 엔진 준비 중입니다');return;}
  const tmp=document.createElement('canvas');
  const sc=Math.min(640/cs.imgW,480/cs.imgH);
  tmp.width=Math.round(cs.imgW*sc); tmp.height=Math.round(cs.imgH*sc);
  tmp.getContext('2d').drawImage(cs.img,0,0,tmp.width,tmp.height);
  const quad=findDocQuad(tmp,sc);
  if(quad){cs.corners=sortQuad(quad);drawCrop();showToast('✓ 문서 경계 자동 감지 완료');}
  else showToast('경계를 찾지 못했어요. 직접 조정해주세요.');
});

// Apply perspective warp
document.getElementById('btn-crop-confirm').addEventListener('click',()=>{
  if(!cvReady){showToast('처리 엔진 준비 중입니다');return;}
  const [tl,tr,br,bl]=cs.corners;
  const outW=Math.round(Math.max(Math.hypot(tr.x-tl.x,tr.y-tl.y),Math.hypot(br.x-bl.x,br.y-bl.y)));
  const outH=Math.round(Math.max(Math.hypot(bl.x-tl.x,bl.y-tl.y),Math.hypot(br.x-tr.x,br.y-tr.y)));
  if(outW<50||outH<50){showToast('영역이 너무 작습니다');return;}
  const sc2=document.createElement('canvas');
  sc2.width=cs.imgW; sc2.height=cs.imgH;
  sc2.getContext('2d').drawImage(cs.img,0,0);
  let srcM,dstM,M,sp,dp;
  try {
    srcM=cv.imread(sc2); dstM=new cv.Mat();
    sp=cv.matFromArray(4,1,cv.CV_32FC2,[tl.x,tl.y,tr.x,tr.y,br.x,br.y,bl.x,bl.y]);
    dp=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,outW,0,outW,outH,0,outH]);
    M=cv.getPerspectiveTransform(sp,dp);
    cv.warpPerspective(srcM,dstM,M,new cv.Size(outW,outH),cv.INTER_LINEAR,cv.BORDER_CONSTANT);
    const out=document.createElement('canvas');
    out.width=outW; out.height=outH;
    cv.imshow(out,dstM);
    currentRawDataUrl=out.toDataURL('image/jpeg',0.95);
    currentFilter='original';
    showReview(currentRawDataUrl);
  } catch(e){showToast('보정 처리 중 오류가 발생했습니다');console.error(e);}
  finally{[srcM,dstM,M,sp,dp].forEach(m=>{try{m&&m.delete();}catch(e){}});}
});

// ══ Review ══
function showReview(dataUrl) {
  showScreen('review-screen');
  currentFilter='original';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter==='original'));
  applyFilter(dataUrl,'original');
}

function applyFilter(dataUrl, filter) {
  const img=new Image();
  img.onload=()=>{
    const canvas=document.getElementById('result-canvas');
    canvas.width=img.width; canvas.height=img.height;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0);
    if(filter!=='original'){
      const id=ctx.getImageData(0,0,canvas.width,canvas.height);
      doFilter(id.data,canvas.width,canvas.height,filter);
      ctx.putImageData(id,0,0);
    }
    currentFilter=filter;
  };
  img.src=dataUrl;
}

function doFilter(d,w,h,filter){
  switch(filter){
    case'scan':{
      const g=new Uint8ClampedArray(w*h);
      for(let i=0;i<d.length;i+=4) g[i/4]=Math.round(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]);
      const bl=gaussBlur(g,w,h,2);
      for(let i=0;i<g.length;i++){
        let v=g[i]+1.8*(g[i]-bl[i]);
        v=(v-60)*1.65+60; v=Math.min(255,Math.max(0,v)); v=sCurve(v);
        const idx=i*4; d[idx]=d[idx+1]=d[idx+2]=v;
      }
      break;
    }
    case'vivid':
      for(let i=0;i<d.length;i+=4){
        const avg=(d[i]+d[i+1]+d[i+2])/3;
        d[i]  =cl(avg+(d[i]  -avg)*1.6+10);
        d[i+1]=cl(avg+(d[i+1]-avg)*1.5+5);
        d[i+2]=cl(avg+(d[i+2]-avg)*1.4);
        d[i]  =cl((d[i]  -128)*1.25+128);
        d[i+1]=cl((d[i+1]-128)*1.25+128);
        d[i+2]=cl((d[i+2]-128)*1.25+128);
      }
      break;
    case'bright':
      for(let i=0;i<d.length;i+=4){d[i]=cl(d[i]*1.2+20);d[i+1]=cl(d[i+1]*1.2+20);d[i+2]=cl(d[i+2]*1.2+20);}
      break;
    case'warm':
      for(let i=0;i<d.length;i+=4){d[i]=cl(d[i]*1.1+20);d[i+1]=cl(d[i+1]*1.02);d[i+2]=cl(d[i+2]*0.88);}
      break;
  }
}

function cl(v){return Math.min(255,Math.max(0,v));}
function sCurve(v){const x=v/255;const o=x<0.5?2*x*x:1-2*(1-x)*(1-x);return Math.round(o*255);}
function gaussBlur(g,w,h,r){
  const kl=r*2+1,half=r,sig=r/2||0.5;
  const k=new Float32Array(kl); let ks=0;
  for(let i=0;i<kl;i++){const x=i-half;k[i]=Math.exp(-(x*x)/(2*sig*sig));ks+=k[i];}
  for(let i=0;i<kl;i++)k[i]/=ks;
  const tmp=new Uint8ClampedArray(g.length),res=new Uint8ClampedArray(g.length);
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){let s=0,ws=0;for(let ki=0;ki<kl;ki++){const nx=x+ki-half;if(nx>=0&&nx<w){s+=g[y*w+nx]*k[ki];ws+=k[ki];}}tmp[y*w+x]=s/ws;}}
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){let s=0,ws=0;for(let ki=0;ki<kl;ki++){const ny=y+ki-half;if(ny>=0&&ny<h){s+=tmp[ny*w+x]*k[ki];ws+=k[ki];}}res[y*w+x]=s/ws;}}
  return res;
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(currentRawDataUrl, btn.dataset.filter);
  });
});

// ══ Save ══
document.getElementById('btn-save-jpg').addEventListener('click',()=>{
  const canvas=document.getElementById('result-canvas');
  const dataUrl=canvas.toDataURL('image/jpeg',0.92);
  dl(dataUrl,`camscan_${Date.now()}.jpg`);
  addToGallery(dataUrl); showToast('✓ JPG 저장 완료');
});
document.getElementById('btn-save-pdf').addEventListener('click',()=>{
  const canvas=document.getElementById('result-canvas');
  const dataUrl=canvas.toDataURL('image/jpeg',0.92);
  const w=canvas.width,h=canvas.height;
  const pdf=new jsPDF({orientation:w>h?'l':'p',unit:'px',format:[w,h]});
  pdf.addImage(dataUrl,'JPEG',0,0,w,h);
  pdf.save(`camscan_${Date.now()}.pdf`);
  addToGallery(dataUrl); showToast('✓ PDF 저장 완료');
});
function dl(dataUrl,name){const a=document.createElement('a');a.href=dataUrl;a.download=name;a.click();}

function addToGallery(dataUrl){
  savedScans.unshift({dataUrl,date:new Date().toLocaleString('ko-KR')});
  if(savedScans.length>30)savedScans=savedScans.slice(0,30);
  try{localStorage.setItem('camscan_v2',JSON.stringify(savedScans));}catch(e){}
  updateScanCount(); updateThumb();
}

// ══ Navigation ══
document.getElementById('btn-back-crop').addEventListener('click',    ()=>showScreen('camera-screen'));
document.getElementById('btn-back-review').addEventListener('click',  ()=>openCropScreen(currentRawDataUrl,cs.corners,cs.imgW,cs.imgH));
document.getElementById('btn-back-gallery').addEventListener('click', ()=>showScreen('camera-screen'));
document.getElementById('btn-open-gallery').addEventListener('click', ()=>showScreen('gallery-screen'));
document.getElementById('btn-add-more').addEventListener('click',     ()=>showScreen('camera-screen'));
document.getElementById('btn-preview-thumb').addEventListener('click',()=>{if(savedScans.length>0)showScreen('gallery-screen');});

// ══ Gallery ══
function renderGallery(){
  const grid=document.getElementById('gallery-grid');
  if(!savedScans.length){grid.innerHTML='<div class="gallery-empty">저장된 스캔이 없습니다</div>';return;}
  grid.innerHTML=savedScans.map((s,i)=>`
    <div class="gallery-item" onclick="viewScan(${i})">
      <img src="${s.dataUrl}" alt="scan ${i+1}">
      <div class="gallery-item-overlay">${s.date}</div>
    </div>`).join('');
}
function viewScan(i){currentRawDataUrl=savedScans[i].dataUrl;currentFilter='original';showReview(currentRawDataUrl);}

// ══ UI helpers ══
function updateThumb(){
  const t=document.getElementById('thumb-preview'),e=document.getElementById('thumb-empty-text');
  if(savedScans.length>0){t.src=savedScans[0].dataUrl;t.style.display='block';e.style.display='none';}
  else{t.style.display='none';e.style.display='';}
}
function updateScanCount(){document.getElementById('scan-count-badge').textContent=savedScans.length+'장';}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

updateScanCount(); updateThumb();
</script>
