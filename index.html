<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CamScan">
<title>CamScan</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg:#0d0d0d; --surface:#1a1a1a; --surface2:#242424; --border:#333;
  --accent:#00e5a0; --accent2:#00b8ff; --text:#f0f0f0; --text-dim:#777;
  --warn:#ffb300; --danger:#ff4c4c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:21px;font-weight:700;letter-spacing:-0.5px;}
.logo .cam{color:var(--accent);}
.logo .sw{color:var(--accent2);}
.badge-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);background:var(--surface2);padding:4px 10px;border-radius:20px;}

/* Screens */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── CAMERA ── */
#cam-screen{position:relative;background:#000;}
#video{width:100%;height:100%;object-fit:cover;display:block;}

/* Overlay canvas for live edge drawing */
#overlay-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

.detect-badge{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700;
  font-family:'Space Mono',monospace;letter-spacing:1px;
  white-space:nowrap;transition:all 0.25s;
}
.detect-badge.found{background:rgba(0,229,160,0.2);color:var(--accent);border:1px solid rgba(0,229,160,0.5);}
.detect-badge.searching{background:rgba(255,179,0,0.15);color:var(--warn);border:1px solid rgba(255,179,0,0.35);}

.cam-tip{position:absolute;bottom:115px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.45);white-space:nowrap;background:rgba(0,0,0,0.45);padding:5px 12px;border-radius:20px;}

.cam-controls{position:absolute;bottom:0;left:0;right:0;padding:16px 24px 28px;background:linear-gradient(transparent,rgba(0,0,0,0.93));display:flex;align-items:center;justify-content:space-around;}
.btn-gallery-cam{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-shutter{width:74px;height:74px;border-radius:50%;background:var(--accent);border:5px solid rgba(0,229,160,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(0,229,160,0.5);transition:transform 0.1s,box-shadow 0.1s;}
.btn-shutter:active{transform:scale(0.9);box-shadow:0 0 10px rgba(0,229,160,0.2);}
.btn-shutter-inner{width:30px;height:30px;border-radius:50%;background:#fff;}
.thumb-wrap{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:10px;text-align:center;line-height:1.4;}
#thumb-img{width:100%;height:100%;object-fit:cover;display:none;}
#detect-scratch{display:none;}

/* ── CROP ── */
#crop-screen{background:#0a0a0a;}
.crop-top{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.screen-label{font-size:12px;color:var(--text-dim);font-family:'Space Mono',monospace;letter-spacing:1px;}
.crop-hint{font-size:11px;color:var(--text-dim);text-align:center;padding:7px 16px;flex-shrink:0;line-height:1.6;}
.crop-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#111;}
#crop-canvas{touch-action:none;display:block;max-width:100%;max-height:100%;}
.crop-actions{padding:12px 16px;display:flex;gap:10px;flex-shrink:0;}
.btn-auto{flex:1;padding:13px;border-radius:12px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background 0.2s;}
.btn-auto:active{background:rgba(0,229,160,0.1);}
.btn-apply{flex:1.8;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* ── REVIEW ── */
#review-screen{background:var(--bg);}
.review-top{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.preview-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:14px;background:#111;}
#result-canvas{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 6px 32px rgba(0,0,0,0.7);}

.filter-bar{padding:12px 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
.filter-label{font-size:10px;color:var(--text-dim);letter-spacing:2px;font-family:'Space Mono',monospace;margin-bottom:8px;}
.filter-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:7px 15px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.18s;}
.filter-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,0.1);}

.save-bar{padding:14px 16px;display:flex;gap:10px;flex-shrink:0;}
.btn-save{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s,transform 0.1s;border:none;}
.btn-save:active{transform:scale(0.97);opacity:0.85;}
.btn-jpg{background:var(--surface2);border:1px solid var(--border)!important;color:var(--text);}
.btn-pdf{background:var(--accent);color:#000;}
.btn-more{width:calc(100% - 32px);margin:0 16px 14px;padding:11px;border-radius:12px;background:transparent;border:1px dashed var(--border);color:var(--text-dim);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* ── GALLERY ── */
#gallery-screen{background:var(--bg);}
.gallery-top{padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.gallery-title{font-size:15px;font-weight:700;}
.gallery-grid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start;}
.g-item{aspect-ratio:3/4;border-radius:10px;overflow:hidden;position:relative;background:var(--surface);border:1px solid var(--border);cursor:pointer;}
.g-item img{width:100%;height:100%;object-fit:cover;}
.g-label{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,0.75));font-size:10px;color:rgba(255,255,255,0.65);font-family:'Space Mono',monospace;}
.g-empty{grid-column:1/-1;text-align:center;color:var(--text-dim);font-size:14px;padding:60px 0;}

/* Shared */
.btn-back{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--accent);color:#000;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:all 0.28s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#file-input{display:none;}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="cam">Cam</span><span class="sw">Scan</span></div>
  <div class="badge-count" id="badge-count">0장</div>
</div>

<!-- CAMERA -->
<div class="screen active" id="cam-screen">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>
  <div class="detect-badge searching" id="detect-badge">문서 탐색 중…</div>
  <div class="cam-tip">📄 문서를 화면에 비춰주세요</div>
  <div class="cam-controls">
    <button class="btn-gallery-cam" id="btn-open-gallery">🖼️</button>
    <button class="btn-shutter" id="btn-shutter"><div class="btn-shutter-inner"></div></button>
    <div class="thumb-wrap" id="btn-thumb">
      <img id="thumb-img" alt="">
      <span id="thumb-empty">스캔<br>없음</span>
    </div>
  </div>
  <canvas id="detect-scratch"></canvas>
</div>

<!-- CROP / ADJUST -->
<div class="screen" id="crop-screen">
  <div class="crop-top">
    <button class="btn-back" id="btn-back-crop">← 다시 찍기</button>
    <span class="screen-label">영역 조정</span>
  </div>
  <div class="crop-hint">🟢 네 꼭짓점을 드래그해서 문서 경계에 맞춰주세요</div>
  <div class="crop-wrap">
    <canvas id="crop-canvas"></canvas>
  </div>
  <div class="crop-actions">
    <button class="btn-auto" id="btn-auto-detect">🔍 자동 감지</button>
    <button class="btn-apply" id="btn-apply-warp">✂️ 원근 보정 적용</button>
  </div>
</div>

<!-- REVIEW -->
<div class="screen" id="review-screen">
  <div class="review-top">
    <button class="btn-back" id="btn-back-review">← 재조정</button>
    <span class="screen-label">PREVIEW</span>
  </div>
  <div class="preview-wrap">
    <canvas id="result-canvas"></canvas>
  </div>
  <div class="filter-bar">
    <div class="filter-label">FILTER</div>
    <div class="filter-row">
      <button class="filter-btn on" data-f="original">원본</button>
      <button class="filter-btn" data-f="scan">스캔</button>
      <button class="filter-btn" data-f="vivid">선명</button>
      <button class="filter-btn" data-f="bright">밝게</button>
      <button class="filter-btn" data-f="warm">따뜻</button>
    </div>
  </div>
  <div class="save-bar">
    <button class="btn-save btn-jpg" id="btn-jpg">📷 JPG 저장</button>
    <button class="btn-save btn-pdf" id="btn-pdf">📄 PDF 저장</button>
  </div>
  <button class="btn-more" id="btn-more">+ 페이지 추가 촬영</button>
</div>

<!-- GALLERY -->
<div class="screen" id="gallery-screen">
  <div class="gallery-top">
    <button class="btn-back" id="btn-back-gallery">← 뒤로</button>
    <span class="gallery-title">저장된 스캔</span>
  </div>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*">

<script>
// ══════════════════════════════════════════════
//  순수 JS 엣지/사각형 감지 + 원근 보정 CamScan
// ══════════════════════════════════════════════
const { jsPDF } = window.jspdf;

let stream = null;
let detectTimer = null;
let lastQuad = null;          // 감지된 꼭짓점 (이미지 좌표)
let rawDataUrl = null;        // 촬영 원본
let currentFilter = 'original';
let scans = [];
try { scans = JSON.parse(localStorage.getItem('cs3') || '[]'); } catch(e) {}

// ━━ 화면 전환 ━━
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'cam-screen') { startCam(); startDetect(); }
  else { stopDetect(); stopCam(); }
  if (id === 'gallery-screen') renderGallery();
}

// ━━ 카메라 ━━
async function startCam() {
  if (stream) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) { toast('카메라 권한이 필요합니다'); }
}
function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('video').srcObject = null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  순수 JS 엣지 감지 (Sobel + 허프라인 없이 윤곽 추적)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function startDetect() {
  stopDetect();
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay-canvas');
  const scratch = document.getElementById('detect-scratch');

  detectTimer = setInterval(() => {
    if (!video.videoWidth) return;

    // 작은 크기로 다운샘플 (성능)
    const vw = video.videoWidth, vh = video.videoHeight;
    const scale = Math.min(400 / vw, 300 / vh);
    const sw = Math.round(vw * scale), sh = Math.round(vh * scale);
    scratch.width = sw; scratch.height = sh;
    scratch.getContext('2d').drawImage(video, 0, 0, sw, sh);

    const quad = detectQuad(scratch);
    lastQuad = quad ? quad.map(p => ({x: p.x / scale, y: p.y / scale})) : null;

    // 오버레이 캔버스에 그리기
    overlay.width = vw; overlay.height = vh;
    drawOverlay(overlay, lastQuad, vw, vh);
  }, 300);
}

function stopDetect() {
  if (detectTimer) { clearInterval(detectTimer); detectTimer = null; }
  const overlay = document.getElementById('overlay-canvas');
  overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
}

// ── 핵심: 사각형 감지 ──
function detectQuad(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;

  // 1. 그레이스케일 변환
  const gray = new Uint8Array(w * h);
  for (let i = 0; i < d.length; i += 4) {
    gray[i >> 2] = (d[i] * 77 + d[i+1] * 150 + d[i+2] * 29) >> 8;
  }

  // 2. 가우시안 블러 (노이즈 제거)
  const blurred = gaussBlur(gray, w, h);

  // 3. Sobel 엣지 감지
  const edges = sobelEdge(blurred, w, h);

  // 4. 임계값 이진화
  const binary = new Uint8Array(w * h);
  const thresh = otsuThreshold(edges, w, h);
  for (let i = 0; i < edges.length; i++) binary[i] = edges[i] > thresh ? 255 : 0;

  // 5. 모폴로지 팽창 (엣지 연결)
  const dilated = dilate(binary, w, h);

  // 6. 외곽선 추출 → 가장 큰 사각형 찾기
  return findLargestQuad(dilated, w, h);
}

function gaussBlur(gray, w, h) {
  const kernel = [1,4,7,4,1, 4,16,26,16,4, 7,26,41,26,7, 4,16,26,16,4, 1,4,7,4,1];
  const kSum = 273;
  const out = new Uint8Array(w * h);
  for (let y = 2; y < h-2; y++) {
    for (let x = 2; x < w-2; x++) {
      let sum = 0;
      for (let ky = -2; ky <= 2; ky++)
        for (let kx = -2; kx <= 2; kx++)
          sum += gray[(y+ky)*w+(x+kx)] * kernel[(ky+2)*5+(kx+2)];
      out[y*w+x] = sum / kSum;
    }
  }
  return out;
}

function sobelEdge(gray, w, h) {
  const out = new Uint8Array(w * h);
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const gx =
        -gray[(y-1)*w+(x-1)] - 2*gray[y*w+(x-1)] - gray[(y+1)*w+(x-1)]
        +gray[(y-1)*w+(x+1)] + 2*gray[y*w+(x+1)] + gray[(y+1)*w+(x+1)];
      const gy =
        -gray[(y-1)*w+(x-1)] - 2*gray[(y-1)*w+x] - gray[(y-1)*w+(x+1)]
        +gray[(y+1)*w+(x-1)] + 2*gray[(y+1)*w+x] + gray[(y+1)*w+(x+1)];
      out[y*w+x] = Math.min(255, Math.sqrt(gx*gx + gy*gy));
    }
  }
  return out;
}

function otsuThreshold(gray, w, h) {
  const hist = new Int32Array(256);
  for (let i = 0; i < gray.length; i++) hist[gray[i]]++;
  const total = w * h;
  let sum = 0;
  for (let i = 0; i < 256; i++) sum += i * hist[i];
  let sumB = 0, wB = 0, max = 0, thresh = 80;
  for (let i = 0; i < 256; i++) {
    wB += hist[i]; if (!wB) continue;
    const wF = total - wB; if (!wF) break;
    sumB += i * hist[i];
    const mB = sumB / wB, mF = (sum - sumB) / wF;
    const between = wB * wF * (mB - mF) * (mB - mF);
    if (between > max) { max = between; thresh = i; }
  }
  return Math.max(thresh * 0.5, 30); // 엣지용은 낮게
}

function dilate(bin, w, h) {
  const out = new Uint8Array(w * h);
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      if (bin[y*w+x] || bin[(y-1)*w+x] || bin[(y+1)*w+x] ||
          bin[y*w+(x-1)] || bin[y*w+(x+1)]) out[y*w+x] = 255;
    }
  }
  return out;
}

// 라인 투표로 사각형 찾기
function findLargestQuad(edges, w, h) {
  // 허프 라인 변환 대신: 에지 포인트에서 convex hull → 사각형 근사
  const pts = [];
  // 균등 샘플링
  for (let y = 0; y < h; y += 2) {
    for (let x = 0; x < w; x += 2) {
      if (edges[y*w+x]) pts.push({x, y});
    }
  }
  if (pts.length < 20) return null;

  // convex hull
  const hull = convexHull(pts);
  if (hull.length < 4) return null;

  // hull을 4개 꼭짓점으로 근사
  const quad = approxQuad(hull, w, h);
  if (!quad) return null;

  // 면적 체크 (전체의 5% 이상)
  const area = polyArea(quad);
  if (area < w * h * 0.05) return null;

  return sortQuad(quad);
}

function convexHull(pts) {
  if (pts.length < 3) return pts;
  pts.sort((a,b) => a.x - b.x || a.y - b.y);
  const lower = [], upper = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  for (let i = pts.length-1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop(); lower.pop();
  return lower.concat(upper);
}

function cross(O, A, B) { return (A.x-O.x)*(B.y-O.y)-(A.y-O.y)*(B.x-O.x); }

function approxQuad(hull, w, h) {
  // Hull의 외접 사각형을 4방향 극점으로 찾기
  // 각 꼭짓점: min(x+y), min(y-x), max(x+y), max(y-x)
  let tl=hull[0], tr=hull[0], br=hull[0], bl=hull[0];
  for (const p of hull) {
    if (p.x+p.y < tl.x+tl.y) tl=p;
    if (p.y-p.x < tr.y-tr.x) tr=p;
    if (p.x+p.y > br.x+br.y) br=p;
    if (p.y-p.x > bl.y-bl.x) bl=p;
  }
  // 4점이 충분히 다른지 확인
  const pts = [tl,tr,br,bl];
  for (let i=0;i<4;i++) for (let j=i+1;j<4;j++) {
    if (Math.hypot(pts[i].x-pts[j].x, pts[i].y-pts[j].y) < Math.min(w,h)*0.1) return null;
  }
  return pts;
}

function polyArea(pts) {
  let a = 0;
  for (let i=0, n=pts.length; i<n; i++) {
    const j = (i+1) % n;
    a += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
  }
  return Math.abs(a) / 2;
}

function sortQuad(pts) {
  const s = [...pts].sort((a,b) => a.y - b.y);
  const top    = s.slice(0,2).sort((a,b) => a.x - b.x);
  const bottom = s.slice(2).sort((a,b) => a.x - b.x);
  return [top[0], top[1], bottom[1], bottom[0]]; // TL TR BR BL
}

// ━━ 오버레이 그리기 ━━
function drawOverlay(canvas, quad, vw, vh) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, vw, vh);
  const badge = document.getElementById('detect-badge');

  if (!quad) {
    badge.className = 'detect-badge searching';
    badge.textContent = '문서 탐색 중…';
    // 가이드 코너만 표시
    const mx = vw*0.08, my = vh*0.14, len = 36, lw = 3;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = lw; ctx.lineCap = 'round';
    [[mx,my,1,1],[vw-mx,my,-1,1],[vw-mx,vh*0.72,-1,-1],[mx,vh*0.72,1,-1]].forEach(([x,y,dx,dy])=>{
      ctx.beginPath(); ctx.moveTo(x+len*dx,y); ctx.lineTo(x,y); ctx.lineTo(x,y+len*dy); ctx.stroke();
    });
    return;
  }

  badge.className = 'detect-badge found';
  badge.textContent = '✓ 문서 감지됨';

  // 반투명 채우기
  ctx.beginPath();
  ctx.moveTo(quad[0].x, quad[0].y);
  quad.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,229,160,0.12)';
  ctx.fill();

  // 테두리 - 두껍고 선명하게
  ctx.beginPath();
  ctx.moveTo(quad[0].x, quad[0].y);
  quad.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.closePath();
  ctx.strokeStyle = '#00e5a0';
  ctx.lineWidth = 4;
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(0,229,160,0.8)';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 꼭짓점 점
  quad.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fillStyle = '#00e5a0';
    ctx.shadowColor = 'rgba(0,229,160,0.9)';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
  });
}

  const r = new FileReader();
  r.onload = ev => {

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CROP 화면
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const cs = { img:null, imgW:0, imgH:0, scale:1, corners:[], dragging:-1 };

function openCrop(dataUrl, detectedCorners, imgW, imgH) {
  const img = new Image();
  img.onload = () => {
    cs.img = img; cs.imgW = imgW; cs.imgH = imgH;
    const wrap = document.querySelector('.crop-wrap');
    const maxW = wrap.clientWidth || window.innerWidth;
    const maxH = wrap.clientHeight || (window.innerHeight - 200);
    cs.scale = Math.min(maxW / imgW, maxH / imgH, 1);
    const cc = document.getElementById('crop-canvas');
    cc.width  = Math.round(imgW * cs.scale);
    cc.height = Math.round(imgH * cs.scale);

    if (detectedCorners && detectedCorners.length === 4) {
      cs.corners = sortQuad(detectedCorners);
    } else {
      const mx = imgW*0.08, my = imgH*0.08;
      cs.corners = [{x:mx,y:my},{x:imgW-mx,y:my},{x:imgW-mx,y:imgH-my},{x:mx,y:imgH-my}];
    }
    drawCrop();
    show('crop-screen');
  };
  img.src = dataUrl;
}

function drawCrop() {
  const cc = document.getElementById('crop-canvas');
  const ctx = cc.getContext('2d');
  const s = cs.scale;
  ctx.clearRect(0, 0, cc.width, cc.height);
  ctx.drawImage(cs.img, 0, 0, cc.width, cc.height);

  // 어둡게 마스킹
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.52)';
  ctx.fillRect(0, 0, cc.width, cc.height);
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  cs.corners.forEach((c,i) => i===0 ? ctx.moveTo(c.x*s,c.y*s) : ctx.lineTo(c.x*s,c.y*s));
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // 테두리
  ctx.save();
  ctx.beginPath();
  cs.corners.forEach((c,i) => i===0 ? ctx.moveTo(c.x*s,c.y*s) : ctx.lineTo(c.x*s,c.y*s));
  ctx.closePath();
  ctx.strokeStyle = '#00e5a0';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = 'rgba(0,229,160,0.7)';
  ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.restore();

  // 모서리 핸들
  cs.corners.forEach(c => {
    const cx = c.x*s, cy = c.y*s;
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,22,0,Math.PI*2);
    ctx.fillStyle='rgba(0,229,160,0.15)'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,10,0,Math.PI*2);
    ctx.fillStyle='#00e5a0';
    ctx.shadowColor='rgba(0,229,160,0.8)'; ctx.shadowBlur=8;
    ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    ctx.restore();
  });

  // 엣지 중간 선
  ctx.save();
  ctx.strokeStyle='rgba(0,229,160,0.4)'; ctx.lineWidth=1; ctx.setLineDash([6,4]);
  for (let i=0;i<4;i++) {
    const a=cs.corners[i], b=cs.corners[(i+1)%4];
    const mx=(a.x+b.x)/2*s, my=(a.y+b.y)/2*s;
    ctx.beginPath(); ctx.arc(mx,my,5,0,Math.PI*2);
    ctx.fillStyle='rgba(0,229,160,0.6)'; ctx.fill();
  }
  ctx.restore();
}

function cropPos(e) {
  const r = document.getElementById('crop-canvas').getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x:(t.clientX-r.left)/cs.scale, y:(t.clientY-r.top)/cs.scale };
}
function nearCorner(pos) {
  let best=-1, bd=Infinity;
  cs.corners.forEach((c,i)=>{const d=Math.hypot(c.x-pos.x,c.y-pos.y);if(d<bd){bd=d;best=i;}});
  return bd < 80 ? best : -1;
}

const cropCanvas = document.getElementById('crop-canvas');
cropCanvas.addEventListener('touchstart', e=>{e.preventDefault();cs.dragging=nearCorner(cropPos(e));},{passive:false});
cropCanvas.addEventListener('touchmove', e=>{
  e.preventDefault(); if(cs.dragging<0) return;
  const p=cropPos(e);
  p.x=Math.max(0,Math.min(cs.imgW,p.x)); p.y=Math.max(0,Math.min(cs.imgH,p.y));
  cs.corners[cs.dragging]=p; drawCrop();
},{passive:false});
cropCanvas.addEventListener('touchend', ()=>cs.dragging=-1);
cropCanvas.addEventListener('mousedown', e=>{cs.dragging=nearCorner(cropPos(e));});
cropCanvas.addEventListener('mousemove', e=>{
  if(cs.dragging<0) return;
  const p=cropPos(e);
  p.x=Math.max(0,Math.min(cs.imgW,p.x)); p.y=Math.max(0,Math.min(cs.imgH,p.y));
  cs.corners[cs.dragging]=p; drawCrop();
});
cropCanvas.addEventListener('mouseup', ()=>cs.dragging=-1);

// 자동 감지 (crop 화면에서 재시도)
document.getElementById('btn-auto-detect').addEventListener('click', () => {
  if (!cs.img) return;
  const tmp = document.createElement('canvas');
  const sc = Math.min(400/cs.imgW, 300/cs.imgH);
  tmp.width=Math.round(cs.imgW*sc); tmp.height=Math.round(cs.imgH*sc);
  tmp.getContext('2d').drawImage(cs.img, 0, 0, tmp.width, tmp.height);
  const quad = detectQuad(tmp);
  if (quad) {
    cs.corners = sortQuad(quad.map(p=>({x:p.x/sc,y:p.y/sc})));
    drawCrop();
    toast('✓ 문서 경계 감지 완료');
  } else {
    toast('감지 실패. 직접 꼭짓점을 조정해주세요.');
  }
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  원근 보정 (Perspective Warp) - 순수 JS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('btn-apply-warp').addEventListener('click', applyWarp);

function applyWarp() {
  const [tl,tr,br,bl] = cs.corners;
  const outW = Math.round(Math.max(Math.hypot(tr.x-tl.x,tr.y-tl.y), Math.hypot(br.x-bl.x,br.y-bl.y)));
  const outH = Math.round(Math.max(Math.hypot(bl.x-tl.x,bl.y-tl.y), Math.hypot(br.x-tr.x,br.y-tr.y)));
  if (outW < 50 || outH < 50) { toast('영역이 너무 작습니다'); return; }

  const srcC = document.createElement('canvas');
  srcC.width=cs.imgW; srcC.height=cs.imgH;
  srcC.getContext('2d').drawImage(cs.img, 0, 0);
  const srcCtx = srcC.getContext('2d');
  const srcData = srcCtx.getImageData(0, 0, cs.imgW, cs.imgH).data;

  const dstC = document.createElement('canvas');
  dstC.width=outW; dstC.height=outH;
  const dstCtx = dstC.getContext('2d');
  const dstData = dstCtx.createImageData(outW, outH);
  const dst = dstData.data;

  // 역방향 투영 행렬 계산
  const H = getPerspectiveMatrix(
    [{x:0,y:0},{x:outW,y:0},{x:outW,y:outH},{x:0,y:outH}],
    [tl, tr, br, bl]
  );

  for (let y=0; y<outH; y++) {
    for (let x=0; x<outW; x++) {
      const [sx, sy] = applyMatrix(H, x, y);
      const ix = Math.round(sx), iy = Math.round(sy);
      const di = (y*outW+x)*4;
      if (ix>=0&&ix<cs.imgW&&iy>=0&&iy<cs.imgH) {
        const si = (iy*cs.imgW+ix)*4;
        dst[di]=srcData[si]; dst[di+1]=srcData[si+1]; dst[di+2]=srcData[si+2]; dst[di+3]=255;
      }
    }
  }
  dstCtx.putImageData(dstData, 0, 0);
  rawDataUrl = dstC.toDataURL('image/jpeg', 0.95);
  currentFilter = 'original';
  showReview(rawDataUrl);
}

// 3x3 원근 변환 행렬
function getPerspectiveMatrix(src, dst) {
  // 8x8 선형 시스템 풀기 (DLT 알고리즘)
  const A = [];
  for (let i=0; i<4; i++) {
    const {x:sx,y:sy}=src[i], {x:dx,y:dy}=dst[i];
    A.push([sx,sy,1, 0,0,0, -dx*sx,-dx*sy]);
    A.push([0,0,0, sx,sy,1, -dy*sx,-dy*sy]);
  }
  const b = dst.flatMap(p=>[p.x,p.y]);
  const h = solveLinear8(A, b);
  return [...h, 1];
}

function solveLinear8(A, b) {
  // 가우스 소거법
  const n=8;
  const M = A.map((row,i)=>[...row, b[i]]);
  for (let col=0; col<n; col++) {
    let maxRow=col;
    for (let row=col+1; row<n; row++) if (Math.abs(M[row][col])>Math.abs(M[maxRow][col])) maxRow=row;
    [M[col],M[maxRow]]=[M[maxRow],M[col]];
    for (let row=col+1; row<n; row++) {
      const f=M[row][col]/M[col][col];
      for (let k=col; k<=n; k++) M[row][k]-=f*M[col][k];
    }
  }
  const x=new Array(n).fill(0);
  for (let i=n-1; i>=0; i--) {
    x[i]=M[i][n]/M[i][i];
    for (let k=i-1; k>=0; k--) M[k][n]-=M[k][i]*x[i];
  }
  return x;
}

function applyMatrix(H, x, y) {
  const w = H[6]*x + H[7]*y + H[8];
  return [(H[0]*x+H[1]*y+H[2])/w, (H[3]*x+H[4]*y+H[5])/w];
}

// ━━ 리뷰 / 필터 ━━
function showReview(dataUrl) {
  show('review-screen');
  currentFilter='original';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('on',b.dataset.f==='original'));
  applyFilter(dataUrl,'original');
}

function applyFilter(dataUrl, filter) {
  const img=new Image();
  img.onload=()=>{
    const canvas=document.getElementById('result-canvas');
    canvas.width=img.width; canvas.height=img.height;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0);
    if(filter!=='original'){
      const id=ctx.getImageData(0,0,canvas.width,canvas.height);
      doFilter(id.data,canvas.width,canvas.height,filter);
      ctx.putImageData(id,0,0);
    }
    currentFilter=filter;
  };
  img.src=dataUrl;
}

function doFilter(d,w,h,f){
  const cl=v=>Math.min(255,Math.max(0,v));
  switch(f){
    case'scan':{
      const g=new Uint8Array(w*h);
      for(let i=0;i<d.length;i+=4) g[i>>2]=(d[i]*77+d[i+1]*150+d[i+2]*29)>>8;
      const bl=gaussBlur(g,w,h);
      for(let i=0;i<g.length;i++){
        let v=g[i]+2.0*(g[i]-bl[i]);
        v=(v-50)*1.7+50; v=cl(v);
        // S커브
        const x=v/255; v=Math.round((x<0.5?2*x*x:1-2*(1-x)*(1-x))*255);
        const idx=i*4; d[idx]=d[idx+1]=d[idx+2]=v;
      }
      break;
    }
    case'vivid':
      for(let i=0;i<d.length;i+=4){
        const avg=(d[i]+d[i+1]+d[i+2])/3;
        d[i]=cl(avg+(d[i]-avg)*1.6+10);
        d[i+1]=cl(avg+(d[i+1]-avg)*1.5+5);
        d[i+2]=cl(avg+(d[i+2]-avg)*1.4);
        d[i]=cl((d[i]-128)*1.3+128);
        d[i+1]=cl((d[i+1]-128)*1.3+128);
        d[i+2]=cl((d[i+2]-128)*1.3+128);
      }
      break;
    case'bright':
      for(let i=0;i<d.length;i+=4){d[i]=cl(d[i]*1.2+20);d[i+1]=cl(d[i+1]*1.2+20);d[i+2]=cl(d[i+2]*1.2+20);}
      break;
    case'warm':
      for(let i=0;i<d.length;i+=4){d[i]=cl(d[i]*1.1+20);d[i+1]=cl(d[i+1]*1.02);d[i+2]=cl(d[i+2]*0.88);}
      break;
  }
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    applyFilter(rawDataUrl, btn.dataset.f);
  });
});

// ━━ 저장 ━━
document.getElementById('btn-jpg').addEventListener('click',()=>{
  const c=document.getElementById('result-canvas');
  const url=c.toDataURL('image/jpeg',0.92);
  dl(url,`camscan_${Date.now()}.jpg`);
  addScan(url); toast('✓ JPG 저장 완료');
});
document.getElementById('btn-pdf').addEventListener('click',()=>{
  const c=document.getElementById('result-canvas');
  const url=c.toDataURL('image/jpeg',0.92);
  const pdf=new jsPDF({orientation:c.width>c.height?'l':'p',unit:'px',format:[c.width,c.height]});
  pdf.addImage(url,'JPEG',0,0,c.width,c.height);
  pdf.save(`camscan_${Date.now()}.pdf`);
  addScan(url); toast('✓ PDF 저장 완료');
});
function dl(url,name){const a=document.createElement('a');a.href=url;a.download=name;a.click();}

function addScan(url){
  scans.unshift({url,date:new Date().toLocaleString('ko-KR')});
  if(scans.length>30)scans=scans.slice(0,30);
  try{localStorage.setItem('cs3',JSON.stringify(scans));}catch(e){}
  updateCount(); updateThumb();
}

// ━━ 갤러리 ━━
function renderGallery(){
  const g=document.getElementById('gallery-grid');
  if(!scans.length){g.innerHTML='<div class="g-empty">저장된 스캔이 없습니다</div>';return;}
  g.innerHTML=scans.map((s,i)=>`
    <div class="g-item" onclick="viewScan(${i})">
      <img src="${s.url}" alt="">
      <div class="g-label">${s.date}</div>
    </div>`).join('');
}
function viewScan(i){rawDataUrl=scans[i].url;currentFilter='original';showReview(rawDataUrl);}

// ━━ UI 유틸 ━━
function updateCount(){document.getElementById('badge-count').textContent=scans.length+'장';}
function updateThumb(){
  const t=document.getElementById('thumb-img'),e=document.getElementById('thumb-empty');
  if(scans.length>0){t.src=scans[0].url;t.style.display='block';e.style.display='none';}
  else{t.style.display='none';e.style.display='';}
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

updateCount(); updateThumb();
show('cam-screen');
